<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Шкільні курси</title>
<style>
  :root { --bg:#faf7f4; --ink:#2d1830; --ink-soft:#6b4d68; --line:#ebe0e4; --accent:#b03171; --accent-soft:#fbe6ee; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:'Segoe UI', system-ui, sans-serif; font-size:18px; line-height:1.6; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap { max-width:560px; width:100%; padding:48px 28px; }
  h1 { font-size:clamp(2rem,5vw,3rem); font-weight:800; letter-spacing:-0.02em; margin-bottom:8px; }
  .sub { color:var(--ink-soft); margin-bottom:48px; font-size:1.05rem; }
  .courses { display:grid; gap:16px; }
  a.course {
    display:block; padding:24px 28px;
    background:#fff; border:1px solid var(--line); border-left:4px solid var(--accent);
    border-radius:4px; text-decoration:none; color:var(--ink);
    transition:transform .15s, box-shadow .15s;
  }
  a.course:hover { transform:translateX(4px); box-shadow:0 8px 24px -8px rgba(45,24,48,.15); }
  a.course:nth-child(2) { border-left-color:#0d6f87; }
  .course-title { font-weight:700; font-size:1.15rem; margin-bottom:4px; }
  .course-meta { font-size:.88rem; color:var(--ink-soft); }
  footer { margin-top:48px; font-size:.82rem; color:var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Шкільні курси</h1>
  <p class="sub">Інтерактивні матеріали для підготовки</p>
  <div class="courses">
    <a class="course" href="heometriya-7-zalik.html">
      <div class="course-title">Геометрія · 7 клас</div>
      <div class="course-meta">Готуємось до річного заліку · 5 розділів · 17 карток · 5 тестів</div>
    </a>
    <a class="course" href="fizyka-z-nulia.html">
      <div class="course-title">Фізика з нуля</div>
      <div class="course-meta">Базовий курс фізики</div>
    </a>
  </div>
  <footer>shchervl.github.io/school_lessons</footer>
</div>
</body>
</html>
